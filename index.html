<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Daniel Li</title>
  <link rel="icon" href="/favicon.ico">
  <link rel="stylesheet" href="main.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
  <!-- InfiniteLimits Logo 5.4 -- Daniel Li, Mar 13 2024 -->
  <header><svg id="banner" viewBox="-400 -400 800 800">
    <defs>
      <radialGradient id="banner-background-gradient">
        <stop offset="0" stop-color="#101012" />
        <stop offset="1" stop-color="#000000" />
      </radialGradient>
      <clipPath id="banner-left-clip">
        <rect x="-200" y="-200" width="100" height="400" />
      </clipPath>
      <clipPath id="banner-right-clip">
        <rect x="100" y="-200" width="100" height="400" />
      </clipPath>
    </defs>

    <rect x="-400" y="-400" width="800" height="800" fill="url(#banner-background-gradient)" />

    <g class="banner-circle" style="--period: 20s">
      <circle
        r="300"
        fill="none"
        stroke="rgb(96,96,108)"
        stroke-width="2"
        stroke-dasharray="0.09 0.01"
        pathLength="1" />
    </g>
    <g class="banner-circle" style="--period: 40s">
      <circle
        r="320"
        fill="none"
        stroke="rgb(72,72,84)"
        stroke-width="2"
        stroke-dasharray="0.14 0.01"
        stroke-dashoffset="0.05"
        pathLength="1" />
    </g>
    <g class="banner-circle" style="--period: 60s">
      <circle
        r="340"
        fill="none"
        stroke="rgb(48,48,56)"
        stroke-width="2"
        stroke-dasharray="0.19 0.01"
        pathLength="1" />
    </g>

    <g id="banner-logo">
      <g id="banner-left-shade-container"><g id="banner-left-shade"><path
        fill="#998700"
        d="M -100.2,24.3 -100.2,74.3 -80,124.8 -80,74.8 Z" /></g></g>
      <g id="banner-right-shade-container"><g id="banner-right-shade"><path
        fill="#994800"
        d="M 100.2,-24.3 100.2,-74.3 80,-124.8 80,-74.8 Z" /></g></g>
      <g clip-path="url(#banner-left-clip)"><g id="banner-left-angle"><path
        fill="#ffe000"
        d="M -100,-52.8 -144,-35.2 -100,74.8 -100,24.8 -119.862,-24.855 -100,-32.8 Z" /></g></g>
      <g clip-path="url(#banner-right-clip)"><g id="banner-right-angle"><path
        fill="#ff7800"
        d="M 100,52.8 144,35.2 100,-74.8 100,-24.8 119.862,24.855 100,32.8 Z" /></g></g>
      <g id="banner-top-left"><path
        fill="#ffe000"
        d="M -10,-110 -80,-110 -80,-28.8 -10,-56.8 Z" /></g>
      <g id="banner-bottom-left"><path
        fill="#ffe000"
        d="M -10,-36.8 -80,-8.8 -80,124.8 -10,96.8 Z" /></g>
      <g id="banner-top-right"><path
        fill="#ff7800"
        d="M 10,36.8 80,8.8 80,-124.8 10,-96.8 Z" /></g>
      <g id="banner-bottom-right"><path
        fill="#ff7800"
        d="M 10,110 80,110 80,28.8 10,56.8 Z" /></g>
    </g>

    <text
      id="banner-title"
      x="0" y="180"
      fill="white"
      text-anchor="middle"
      dominant-baseline="central"
      font-size="25px"
      font-weight="bold"
      letter-spacing="5">
      INFINITELIMITS
    </text>
    <text
      id="banner-subtitle"
      x="0" y="205"
      fill="white"
      text-anchor="middle"
      dominant-baseline="central"
      font-size="14px"
      letter-spacing="4">
      ZERO TO INFINITY
    </text>
  </svg></header>
</body>
</html>
